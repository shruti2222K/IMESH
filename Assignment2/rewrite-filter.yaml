apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rewrite-route
  namespace: gateway-demo
spec:
  parentRefs:
    - name: envoy-gateway

  hostnames:
    - api.company.local

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api

      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              replacePrefixMatch: /

      backendRefs:
        - name: httpbin
          port: 80
