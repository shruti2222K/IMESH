
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: gateway-demo
spec:
  parentRefs:
    - name: envoy-gateway

  rules:

  - matches:
      - headers:
          - name: Host
            value: web.company.local
    backendRefs:
      - name: nginx
        port: 80

  - matches:
      - headers:
          - name: Host
            value: api.company.local
    backendRefs:
      - name: httpbin
        port: 80

  - matches:
      - headers:
          - name: Host
            value: test.company.local
    backendRefs:
      - name: echoserver
        port: 80
