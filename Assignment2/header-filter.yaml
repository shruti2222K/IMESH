
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: header-route
  namespace: gateway-demo
spec:
  parentRefs:
    - name: envoy-gateway

  hostnames:
    - api.company.local

  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Company
                value: DevOps
              - name: X-Team
                value: Platform

      backendRefs:
        - name: httpbin
          port: 80
