apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: ratelimit
  namespace: gateway-demo
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: api-routing

  rateLimit:
    type: Local

    local:
      rules:
      - clientSelectors:
        - sourceCIDR:
            type: Distinct

        limit:
          requests: 10
          unit: Minute
