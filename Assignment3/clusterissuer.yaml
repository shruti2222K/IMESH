apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: root-ca
  namespace: gateway-demo
spec:
  isCA: true
  commonName: company-root-ca
  secretName: root-ca-secret

  privateKey:
    algorithm: RSA
    size: 2048

  issuerRef:
    name: selfsigned-clusterissuer
    kind: ClusterIssuer
